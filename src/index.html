<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Around the U.S" />
    <meta name="author" content="Marcos Santiz" />
    <meta name="keywords" content="around, U.S, viaje, fotos, montañas" />
    <title>Around the U.S</title>
    <link rel="stylesheet" href="./page/index.css" />
    <link rel="shortcut icon" href="../favicon.ico" />
  </head>

  <body>
    <div class="page">
      <header class="header">
        <div class="header__container">
          <img
            src="./images/Vector.svg"
            alt="Logotipo de Around the U.S"
            class="header__logo"
          />
          <img
            src="./images/Line.png"
            alt="Línea de separación"
            class="header__line"
          />
        </div>
      </header>

      <section class="cover">
        <div class="cover__container">
          <div class="cover__avatar">
            <img
              src="./images/image.jpg"
              alt="Foto de perfil"
              class="cover__container-image"
            />

            <img
              src="./images/pencil.png"
              alt="Editar avatar"
              class="cover__avatar-edit"
            />
          </div>

          <div class="cover__text">
            <div class="cover__info">
              <h2 class="cover__name cover__container__info-name">
                Jacques Cousteau
              </h2>
              <button type="button" class="cover__button" id="openPopup">
                <img
                  src="./images/pencil.png"
                  alt="Editar"
                  class="cover__button-image"
                />
              </button>
            </div>
            <p class="cover__role cover__container__info-role">Explorador</p>
          </div>

          <div class="cover__plusbutton">
            <img
              src="./images/+.png"
              alt="Botón más"
              class="cover__plusbutton-image"
            />
          </div>
        </div>
      </section>

      <main class="content">
        <section class="elements"></section>
      </main>

      <footer class="footer">
        <p class="footer__copyright">© 2024 Around The U.S.</p>
      </footer>

      <div id="popup" class="popup">
        <div class="popup__container">
          <img
            src="./images/Close Icon (3).png"
            alt="Cerrar"
            class="popup__close"
            id="closePopup"
          />
          <h2 class="popup__title">Editar perfil</h2>

          <form class="popup__form" id="editForm">
            <input
              type="text"
              id="name"
              class="popup__input"
              placeholder="Nombre"
              name="name"
              required
              minlength="2"
              maxlength="40"
            />
            <span class="popup__line"></span>
            <span class="popup__error" id="name-error"></span>

            <input
              type="text"
              id="about"
              class="popup__input"
              placeholder="Acerca de mí"
              name="about"
              required
              minlength="2"
              maxlength="200"
            />
            <span class="popup__line"></span>
            <span class="popup__error" id="about-error"></span>

            <button id="saveButton" type="submit" class="popup__savebutton">
              Guardar
            </button>
          </form>
        </div>
      </div>

      <div id="popupConfirm" class="popup">
        <div class="popup__container">
          <img
            src="./images/Close Icon (3).png"
            alt="Cerrar"
            class="popup__close"
            id="closePopupConfirm"
          />
          <h2 class="popup__title-delete">¿Estás seguro?</h2>
          <button id="confirmButton" type="button" class="popup__savebutton">
            Si
          </button>
        </div>
      </div>

      <div id="popupAvatar" class="popup">
        <div class="popup__container">
          <img
            src="./images/Close Icon (3).png"
            alt="Cerrar"
            class="popup__close"
            id="closePopupAvatar"
          />
          <h2 class="popup__title">Cambiar foto de perfil</h2>
          <form class="popup__form" id="editAvatar">
            <input
              type="url"
              class="popup__input popup__input-text popup__form__text"
              placeholder="Imagen"
              id="Avatar"
              name="avatar"
              required
              minlength="2"
            />

            <span class="popup__line"></span>
            <span class="popup__error" id="avatar-error"></span>

            <button id="saveAvatar" type="submit" class="popup__savebutton">
              Guardar
            </button>
          </form>
        </div>
      </div>

      <div id="popupPlace" class="popup">
        <div class="popup__container">
          <img
            src="./images/Close Icon (3).png"
            alt="Cerrar"
            class="popup__close"
            id="closePopupPlace"
          />
          <h2 class="popup__title">New Place</h2>

          <form class="popup__form" id="newPlaceForm">
            <input
              type="text"
              class="popup__input popup__input-place popup__input-text popup__form__text"
              placeholder="Title"
              id="placeTitle"
              name="title"
              required
              minlength="2"
              maxlength="30"
            />
            <span class="popup__line"></span>
            <span class="popup__error" id="title-error"></span>

            <input
              type="url"
              class="popup__input popup__input-place popup__input-text popup__form__text"
              placeholder="Image URL"
              id="placeImage"
              name="image"
              required
            />
            <span class="popup__line"></span>
            <span class="popup__error" id="image-error"></span>

            <button
              id="savePlaceButton"
              type="submit"
              class="popup__savebutton"
            >
              Guardar
            </button>
          </form>
        </div>
      </div>
      <div id="popupImage" class="popup popup-image">
        <div class="popup-image__container">
          <img
            src="./images/Close Icon (3).png"
            alt="Cerrar"
            class="popup__close popup-image__close"
            id="closePopupImage"
          />

          <img class="popup-image__photo" src=" " alt="" />
          <p class="popup-image__caption"></p>
        </div>
      </div>
    </div>
    <template id="card-template"
      ><figure class="elements__item">
        <div class="elements__image-container">
          <img class="elements__image" />
          <button class="elements__delete-button">
            <img src="./images/Trash.png" alt="Eliminar" />
          </button>
        </div>

        <div class="elements__foot">
          <p class="elements__foot-text"></p>
          <button class="elements__foot-button">
            <img src="./images/heart.svg" class="elements__button-image" />
          </button>
        </div>
      </figure>
    </template>
    <script type="module" src="./components/validate.js"></script>
    <script type="module" src="../src/page/index.js"></script>
  </body>
</html>
